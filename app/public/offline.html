<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6366f1" />
  <title>TimeFlow — Sin conexión</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #0a0a0f;
      color: #f0f0f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100%;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .container {
      text-align: center;
      padding: 32px 24px;
      max-width: 320px;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 16px;
      display: block;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #f0f0f5;
    }
    p {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    button {
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }
    button:active {
      background: #4f46e5;
    }
    .hint {
      margin-top: 16px;
      font-size: 11px;
      color: #4a4a6a;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="icon">📡</span>
    <h1>Sin conexión</h1>
    <p>TimeFlow necesita conexión a internet para funcionar. Comprueba tu red y vuélvelo a intentar.</p>
    <button onclick="window.location.reload()">Reintentar</button>
    <p class="hint">Si el problema persiste, comprueba que el túnel Autossh esté activo.</p>
  </div>
</body>
</html>
